name: Build OpenWrt

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-openwrt.yml'
      - '.config'
      - 'diy-part*.sh'
      - 'feeds.conf.default'
      - 'files/**'
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: 0 8 * * 2

permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/kkstone/immortalwrt-ipq50xx
  REPO_BRANCH: openwrt-21.02
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        dpkg-query -Wf '${Installed-Size}\t${Package}\n' | sort -n | tail -n 100
        df -h
        echo "Removing large packages"
        sudo apt-get remove -y '^dotnet-.*'
        sudo apt-get remove -y '^llvm-.*'
        sudo apt-get remove -y 'php.*'
        sudo apt-get remove -y '^mongodb-.*'
        sudo apt-get remove -y '^mysql-.*'
        sudo apt-get remove -y azure-cli google-cloud-sdk google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri || true
        sudo apt-get autoremove -y
        sudo apt-get clean
        df -h
        echo "Removing large directories"
        sudo rm -rf /usr/share/dotnet/
        sudo rm -rf /usr/local/graalvm/
        sudo rm -rf /usr/local/.ghcup/
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/lib/node_modules
        df -h
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
        libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
        mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip libpython3-dev qemu-utils \
        rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Enable build ccache
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: 'immortalwrt21-cortexa7-vfpv4'
        prefix: ${{ github.workspace }}/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
   
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Fix golang version
      run: |
        cd openwrt
        rm -rf feeds/packages/lang/golang
        git clone --depth=1 --branch 1.26 https://github.com/kenzok8/golang feeds/packages/lang/golang

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Upgrade some network software version
      run: |
        cd openwrt

        PKG_TMP="$(mktemp -d)"
        git clone --depth=1 --filter=blob:none --sparse https://github.com/immortalwrt/packages "$PKG_TMP"
        (
          cd "$PKG_TMP"
          git sparse-checkout set net/xray-core net/tailscale net/natmap
        )
        rm -rf feeds/packages/net/xray-core feeds/packages/net/tailscale feeds/packages/net/natmap
        cp -rf "$PKG_TMP/net/xray-core" feeds/packages/net/xray-core
        cp -rf "$PKG_TMP/net/tailscale" feeds/packages/net/tailscale
        cp -rf "$PKG_TMP/net/natmap" feeds/packages/net/natmap
        rm -rf "$PKG_TMP"

        wget --tries=5 --retry-connrefused --waitretry=5 "https://www.dropbox.com/scl/fi/uccikbibj772c4sekzbk7/luci-app-turboacc.zip?rlkey=yzhkk0lfzhrthn8hbl1qt8k5j&st=31820445&dl=1" -O luci-app-turboacc.zip
        rm -rf feeds/luci/applications/luci-app-turboacc
        unzip luci-app-turboacc.zip -d feeds/luci/applications/
        rm -rf luci-app-turboacc.zip

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Fix some download failed first
      run: |
        cd openwrt
        mkdir dl
        wget "https://www.dropbox.com/scl/fi/9ts30p2csnlb9imaf8k68/backports-20210222-5.4-qsdk-11.5.0.5.tar.xz?rlkey=sntbyfjgg86gu2uoocgb9ggp1&st=7w81hl56&dl=1" -O dl/backports-20210222-5.4-qsdk-11.5.0.5.tar.xz
        wget "https://www.dropbox.com/scl/fi/gu7ge6jmefn72ttuop1zs/linux-5.4-qsdk-11.5.0.5.tar.xz?rlkey=tdpq0ye35x290frbh7i8uqrm8&st=jjvegqrr&dl=1" -O dl/linux-5.4-qsdk-11.5.0.5.tar.xz

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Ensure WireGuard kernel source
      run: |
        cd openwrt
        KERNEL_TARGET_CONFIG="target/linux/ipq50xx/config-5.4"
        if [ -f "$KERNEL_TARGET_CONFIG" ]; then
          sed -i '/CONFIG_WIREGUARD/d;/CONFIG_NET_UDP_TUNNEL/d;/CONFIG_CRYPTO_CHACHA20_NEON/d;/CONFIG_CRYPTO_POLY1305_ARM/d;/CONFIG_CRYPTO_CURVE25519_NEON/d;/CONFIG_CRYPTO_NHPOLY1305_NEON/d;/CONFIG_CRYPTO_LIB_CHACHA/d;/CONFIG_CRYPTO_LIB_CHACHA_GENERIC/d;/CONFIG_CRYPTO_ARCH_HAVE_LIB_CHACHA/d;/CONFIG_CRYPTO_LIB_CHACHA20POLY1305/d;/CONFIG_CRYPTO_LIB_POLY1305/d;/CONFIG_CRYPTO_LIB_POLY1305_GENERIC/d;/CONFIG_CRYPTO_LIB_POLY1305_RSIZE/d;/CONFIG_CRYPTO_ARCH_HAVE_LIB_POLY1305/d;/CONFIG_CRYPTO_LIB_BLAKE2S/d;/CONFIG_CRYPTO_LIB_BLAKE2S_GENERIC/d;/CONFIG_CRYPTO_ARCH_HAVE_LIB_BLAKE2S/d;/CONFIG_CRYPTO_LIB_CURVE25519/d;/CONFIG_CRYPTO_LIB_CURVE25519_GENERIC/d;/CONFIG_CRYPTO_ARCH_HAVE_LIB_CURVE25519/d' "$KERNEL_TARGET_CONFIG"
          cat >> "$KERNEL_TARGET_CONFIG" <<'EOF'
        CONFIG_WIREGUARD=m
        # CONFIG_WIREGUARD_DEBUG is not set
        CONFIG_NET_UDP_TUNNEL=m
        # CONFIG_CRYPTO_CHACHA20_NEON is not set
        # CONFIG_CRYPTO_POLY1305_ARM is not set
        # CONFIG_CRYPTO_CURVE25519_NEON is not set
        # CONFIG_CRYPTO_NHPOLY1305_NEON is not set
        CONFIG_CRYPTO_LIB_CHACHA=m
        CONFIG_CRYPTO_LIB_CHACHA_GENERIC=m
        # CONFIG_CRYPTO_ARCH_HAVE_LIB_CHACHA is not set
        CONFIG_CRYPTO_LIB_CHACHA20POLY1305=m
        CONFIG_CRYPTO_LIB_POLY1305=m
        CONFIG_CRYPTO_LIB_POLY1305_GENERIC=m
        CONFIG_CRYPTO_LIB_POLY1305_RSIZE=9
        # CONFIG_CRYPTO_ARCH_HAVE_LIB_POLY1305 is not set
        CONFIG_CRYPTO_LIB_BLAKE2S=m
        CONFIG_CRYPTO_LIB_BLAKE2S_GENERIC=m
        # CONFIG_CRYPTO_ARCH_HAVE_LIB_BLAKE2S is not set
        CONFIG_CRYPTO_LIB_CURVE25519=m
        CONFIG_CRYPTO_LIB_CURVE25519_GENERIC=m
        # CONFIG_CRYPTO_ARCH_HAVE_LIB_CURVE25519 is not set
        EOF
        fi

        make defconfig
        make target/linux/prepare V=s
        LINUX_DIR="$(find build_dir/target-* -type d -path '*/linux-ipq50xx*/linux-5.4*' | head -n 1)"
        if [ -z "$LINUX_DIR" ]; then
          echo "::error::kernel source directory was not prepared"
          exit 1
        fi

        mkdir -p "$LINUX_DIR/include/crypto/internal" "$LINUX_DIR/lib/crypto"
        if [ ! -f "$LINUX_DIR/lib/crypto/Kconfig" ]; then
          cat > "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'
        # SPDX-License-Identifier: GPL-2.0

        comment "Crypto library routines"
        EOF
        fi
        if ! grep -q 'source "lib/crypto/Kconfig"' "$LINUX_DIR/crypto/Kconfig"; then
          sed -i '/source "drivers\/crypto\/Kconfig"/i source "lib/crypto/Kconfig"' "$LINUX_DIR/crypto/Kconfig"
        fi

        fetch_linux55_file() {
          local relpath="$1"
          curl -fsSL --retry 5 --retry-connrefused --connect-timeout 20 \
            "https://raw.githubusercontent.com/torvalds/linux/v5.5/$relpath" \
            -o "$LINUX_DIR/$relpath"
        }

        if [ ! -f "$LINUX_DIR/include/crypto/blake2s.h" ]; then
          fetch_linux55_file include/crypto/blake2s.h
        fi
        if [ ! -f "$LINUX_DIR/include/crypto/internal/blake2s.h" ]; then
          fetch_linux55_file include/crypto/internal/blake2s.h
        fi
        if [ ! -f "$LINUX_DIR/lib/crypto/blake2s.c" ]; then
          fetch_linux55_file lib/crypto/blake2s.c
          sed -i 's/^bool blake2s_selftest(void);$/static inline bool blake2s_selftest(void) { return true; }/' "$LINUX_DIR/lib/crypto/blake2s.c"
        fi
        if [ ! -f "$LINUX_DIR/lib/crypto/blake2s-generic.c" ]; then
          fetch_linux55_file lib/crypto/blake2s-generic.c
        fi
        if ! grep -q 'CHACHA_STATE_WORDS' "$LINUX_DIR/include/crypto/chacha.h" 2>/dev/null || ! grep -q 'chacha20_crypt' "$LINUX_DIR/include/crypto/chacha.h" 2>/dev/null; then
          fetch_linux55_file include/crypto/chacha.h
        fi
        if [ ! -f "$LINUX_DIR/include/crypto/internal/chacha.h" ]; then
          fetch_linux55_file include/crypto/internal/chacha.h
        fi
        if ! grep -q 'hchacha_block_generic' "$LINUX_DIR/lib/crypto/chacha.c" 2>/dev/null; then
          fetch_linux55_file lib/crypto/chacha.c
        fi
        if [ ! -f "$LINUX_DIR/lib/crypto/libchacha.c" ]; then
          fetch_linux55_file lib/crypto/libchacha.c
        fi
        if ! grep -q 'poly1305_init(struct poly1305_desc_ctx' "$LINUX_DIR/include/crypto/poly1305.h" 2>/dev/null || ! grep -q 'CRYPTO_LIB_POLY1305_RSIZE' "$LINUX_DIR/include/crypto/poly1305.h" 2>/dev/null; then
          fetch_linux55_file include/crypto/poly1305.h
        fi
        if [ ! -f "$LINUX_DIR/include/crypto/internal/poly1305.h" ]; then
          fetch_linux55_file include/crypto/internal/poly1305.h
        fi
        if ! grep -q 'poly1305_init_generic' "$LINUX_DIR/lib/crypto/poly1305.c" 2>/dev/null; then
          fetch_linux55_file lib/crypto/poly1305.c
        fi

        apply_backport_patch() {
          local patch_file="$1"
          echo "Applying $(basename "$patch_file")"
          if ! patch -d "$LINUX_DIR" -p1 -N --batch < "$patch_file"; then
            echo "::warning::$(basename "$patch_file") had rejects; continuing because QSDK may already carry part of this backport"
          fi
        }

        if [ ! -f "$LINUX_DIR/include/crypto/curve25519.h" ] || [ ! -f "$LINUX_DIR/include/crypto/chacha20poly1305.h" ]; then
          echo "WireGuard crypto headers are missing from $LINUX_DIR; applying the required 5.4 crypto backports"
          for patch_file in \
            target/linux/generic/backport-5.4/080-wireguard-0025-crypto-curve25519-generic-C-library-implementations.patch \
            target/linux/generic/backport-5.4/080-wireguard-0028-crypto-lib-curve25519-work-around-Clang-stack-spilli.patch \
            target/linux/generic/backport-5.4/080-wireguard-0032-crypto-chacha20poly1305-import-construction-and-self.patch \
            target/linux/generic/backport-5.4/080-wireguard-0033-crypto-lib-chacha20poly1305-reimplement-crypt_from_s.patch \
            target/linux/generic/backport-5.4/080-wireguard-0036-crypto-lib-chacha20poly1305-use-chacha20_crypt.patch \
            target/linux/generic/backport-5.4/080-wireguard-0045-crypto-curve25519-Fix-selftest-build-error.patch \
            target/linux/generic/backport-5.4/080-wireguard-0051-crypto-chacha20poly1305-prevent-integer-overflow-on-.patch \
            target/linux/generic/backport-5.4/080-wireguard-0058-crypto-lib-chacha20poly1305-Add-missing-function-dec.patch \
            target/linux/generic/backport-5.4/080-wireguard-0070-crypto-lib-chacha20poly1305-define-empty-module-exit.patch
          do
            apply_backport_patch "$patch_file"
          done
        fi

        if ! grep -q '^config CRYPTO_ARCH_HAVE_LIB_CHACHA$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_ARCH_HAVE_LIB_CHACHA
                tristate
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_CHACHA_GENERIC$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_CHACHA_GENERIC
                tristate
                select CRYPTO_ALGAPI
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_CHACHA$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_CHACHA
                tristate "ChaCha library interface"
                select CRYPTO_LIB_CHACHA_GENERIC
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_POLY1305_RSIZE$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_POLY1305_RSIZE
                int
                default 9 if ARM || ARM64
                default 1
        EOF
        fi
        if ! grep -q '^config CRYPTO_ARCH_HAVE_LIB_POLY1305$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_ARCH_HAVE_LIB_POLY1305
                tristate
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_POLY1305_GENERIC$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_POLY1305_GENERIC
                tristate
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_POLY1305$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_POLY1305
                tristate "Poly1305 library interface"
                select CRYPTO_LIB_POLY1305_GENERIC
        EOF
        fi
        if ! grep -q '^config CRYPTO_ARCH_HAVE_LIB_BLAKE2S$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_ARCH_HAVE_LIB_BLAKE2S
                tristate
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_BLAKE2S_GENERIC$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_BLAKE2S_GENERIC
                tristate
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_BLAKE2S$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_BLAKE2S
                tristate "BLAKE2s hash function library"
                select CRYPTO_LIB_BLAKE2S_GENERIC
        EOF
        fi
        if ! grep -q '^config CRYPTO_ARCH_HAVE_LIB_CURVE25519$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_ARCH_HAVE_LIB_CURVE25519
                tristate
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_CURVE25519_GENERIC$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_CURVE25519_GENERIC
                tristate
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_CURVE25519$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_CURVE25519
                tristate "Curve25519 scalar multiplication library"
                select CRYPTO_LIB_CURVE25519_GENERIC
        EOF
        fi
        if ! grep -q '^config CRYPTO_LIB_CHACHA20POLY1305$' "$LINUX_DIR/lib/crypto/Kconfig"; then
          cat >> "$LINUX_DIR/lib/crypto/Kconfig" <<'EOF'

        config CRYPTO_LIB_CHACHA20POLY1305
                tristate "ChaCha20-Poly1305 AEAD support"
                select CRYPTO_LIB_CHACHA
                select CRYPTO_LIB_POLY1305
        EOF
        fi

        sed -i '/obj-y.*chacha\.o/d;/CRYPTO_LIB_CHACHA_GENERIC/d;/libchacha/d;/CRYPTO_LIB_POLY1305_GENERIC/d;/libpoly1305/d;/CRYPTO_LIB_BLAKE2S/d;/libblake2s/d;/CRYPTO_LIB_CURVE25519/d;/libcurve25519/d;/CRYPTO_LIB_CHACHA20POLY1305/d;/libchacha20poly1305/d' "$LINUX_DIR/lib/crypto/Makefile"
        cat >> "$LINUX_DIR/lib/crypto/Makefile" <<'EOF'
        obj-y						+= chacha.o
        obj-$(CONFIG_CRYPTO_LIB_CHACHA_GENERIC)	+= libchacha.o

        obj-$(CONFIG_CRYPTO_LIB_POLY1305_GENERIC)	+= libpoly1305.o
        libpoly1305-y					:= poly1305.o

        obj-$(CONFIG_CRYPTO_LIB_BLAKE2S_GENERIC)	+= libblake2s-generic.o
        libblake2s-generic-y				+= blake2s-generic.o

        obj-$(CONFIG_CRYPTO_LIB_BLAKE2S)		+= libblake2s.o
        libblake2s-y					+= blake2s.o

        obj-$(CONFIG_CRYPTO_LIB_CHACHA20POLY1305)	+= libchacha20poly1305.o
        libchacha20poly1305-y				+= chacha20poly1305.o

        obj-$(CONFIG_CRYPTO_LIB_CURVE25519_GENERIC)	+= libcurve25519-generic.o
        libcurve25519-generic-y			:= curve25519-fiat32.o
        libcurve25519-generic-$(CONFIG_ARCH_SUPPORTS_INT128)	+= curve25519-hacl64.o
        libcurve25519-generic-y			+= curve25519-generic.o

        obj-$(CONFIG_CRYPTO_LIB_CURVE25519)		+= libcurve25519.o
        libcurve25519-y				+= curve25519.o
        EOF

        if [ ! -d "$LINUX_DIR/drivers/net/wireguard" ]; then
          echo "WireGuard source is missing from $LINUX_DIR; applying the 5.4 WireGuard driver backport"
          apply_backport_patch target/linux/generic/backport-5.4/080-wireguard-0072-net-WireGuard-secure-network-tunnel.patch
        fi

        if [ ! -d "$LINUX_DIR/drivers/net/wireguard" ]; then
          echo "::error::drivers/net/wireguard is still missing after prepare"
          exit 1
        fi
        grep -R "config WIREGUARD" "$LINUX_DIR" || {
          echo "::error::CONFIG_WIREGUARD is not defined in the prepared kernel source"
          exit 1
        }
        for header in curve25519.h chacha20poly1305.h blake2s.h chacha.h poly1305.h internal/poly1305.h; do
          if [ ! -f "$LINUX_DIR/include/crypto/$header" ]; then
            echo "::error::include/crypto/$header is missing from the prepared kernel source"
            exit 1
          fi
        done
        for src in chacha.c libchacha.c poly1305.c chacha20poly1305.c blake2s.c blake2s-generic.c; do
          if [ ! -f "$LINUX_DIR/lib/crypto/$src" ]; then
            echo "::error::lib/crypto/$src is missing from the prepared kernel source"
            exit 1
          fi
        done
        if [ -f "$LINUX_DIR/.config" ]; then
          ./scripts/config --file "$LINUX_DIR/.config" -m WIREGUARD
          ./scripts/config --file "$LINUX_DIR/.config" -d WIREGUARD_DEBUG
          ./scripts/config --file "$LINUX_DIR/.config" -m NET_UDP_TUNNEL
          ./scripts/config --file "$LINUX_DIR/.config" -d CRYPTO_CHACHA20_NEON
          ./scripts/config --file "$LINUX_DIR/.config" -d CRYPTO_POLY1305_ARM
          ./scripts/config --file "$LINUX_DIR/.config" -d CRYPTO_CURVE25519_NEON
          ./scripts/config --file "$LINUX_DIR/.config" -d CRYPTO_NHPOLY1305_NEON
          ./scripts/config --file "$LINUX_DIR/.config" -m CRYPTO_LIB_CHACHA
          ./scripts/config --file "$LINUX_DIR/.config" -m CRYPTO_LIB_CHACHA_GENERIC
          ./scripts/config --file "$LINUX_DIR/.config" -d CRYPTO_ARCH_HAVE_LIB_CHACHA
          ./scripts/config --file "$LINUX_DIR/.config" -m CRYPTO_LIB_CHACHA20POLY1305
          ./scripts/config --file "$LINUX_DIR/.config" -m CRYPTO_LIB_POLY1305
          ./scripts/config --file "$LINUX_DIR/.config" -m CRYPTO_LIB_POLY1305_GENERIC
          ./scripts/config --file "$LINUX_DIR/.config" --set-val CRYPTO_LIB_POLY1305_RSIZE 9
          ./scripts/config --file "$LINUX_DIR/.config" -d CRYPTO_ARCH_HAVE_LIB_POLY1305
          ./scripts/config --file "$LINUX_DIR/.config" -m CRYPTO_LIB_BLAKE2S
          ./scripts/config --file "$LINUX_DIR/.config" -m CRYPTO_LIB_BLAKE2S_GENERIC
          ./scripts/config --file "$LINUX_DIR/.config" -d CRYPTO_ARCH_HAVE_LIB_BLAKE2S
          ./scripts/config --file "$LINUX_DIR/.config" -m CRYPTO_LIB_CURVE25519
          ./scripts/config --file "$LINUX_DIR/.config" -m CRYPTO_LIB_CURVE25519_GENERIC
          ./scripts/config --file "$LINUX_DIR/.config" -d CRYPTO_ARCH_HAVE_LIB_CURVE25519
        fi

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Verify WireGuard kernel module
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        KERNEL_CONFIG="$(find build_dir/target-* -path '*/linux-ipq50xx*/linux-5.4*/.config' | head -n 1)"
        if [ -z "$KERNEL_CONFIG" ]; then
          echo "::error::kernel .config was not found"
          exit 1
        fi

        echo "Kernel WireGuard config:"
        grep -H '^CONFIG_WIREGUARD=' "$KERNEL_CONFIG" || true
        if ! grep -q '^CONFIG_WIREGUARD=m$' "$KERNEL_CONFIG"; then
          echo "::error::CONFIG_WIREGUARD is not compiled as a module"
          exit 1
        fi

        echo "WireGuard build output:"
        find build_dir/target-* -path '*/linux-ipq50xx*/linux-5.4*/drivers/net/wireguard/wireguard.ko*' -print
        if ! find build_dir/target-* -path '*/linux-ipq50xx*/linux-5.4*/drivers/net/wireguard/wireguard.ko*' | grep -q .; then
          echo "::error::wireguard.ko was not built in the kernel source tree"
          exit 1
        fi

        echo "WireGuard rootfs module:"
        find build_dir/target-* -path '*/root-*/lib/modules/*/wireguard.ko*' -print
        ROOTFS_WG="$(find build_dir/target-* -path '*/root-*/lib/modules/*/wireguard.ko*' | head -n 1)"
        if [ -z "$ROOTFS_WG" ]; then
          echo "::error::wireguard.ko is missing from the firmware rootfs"
          exit 1
        fi
        file "$ROOTFS_WG" || true
        strings "$ROOTFS_WG" | grep -m1 '^vermagic=' || true

        echo "WireGuard kmod package contents:"
        IPK_REL="$(find bin/packages bin/targets -name 'kmod-wireguard*.ipk' 2>/dev/null | head -n 1)"
        if [ -z "$IPK_REL" ]; then
          echo "::error::kmod-wireguard ipk was not produced"
          exit 1
        fi
        IPK="$PWD/$IPK_REL"
        TMP_IPK="$(mktemp -d)"
        (cd "$TMP_IPK" && ar x "$IPK")
        DATA_TAR="$(find "$TMP_IPK" -name 'data.tar*' | head -n 1)"
        if [ -z "$DATA_TAR" ]; then
          echo "::error::kmod-wireguard ipk has no data archive"
          exit 1
        fi
        tar -tf "$DATA_TAR" | tee /tmp/kmod-wireguard-files.txt
        if ! grep -q 'lib/modules/.*/wireguard.ko' /tmp/kmod-wireguard-files.txt; then
          echo "::error::kmod-wireguard ipk does not contain wireguard.ko"
          exit 1
        fi
        
    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        for image in *-squashfs-nand-factory.ubi; do
          [ -e "$image" ] || continue
          cp -f "$image" "${image%.ubi}.bin"
        done
        if ls *-squashfs-nand-factory.bin >/dev/null 2>&1; then
          sha256sum *-squashfs-nand-factory.bin >> sha256sums
        fi
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
      run: |
        echo "release_tag=RAX3000Q-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        cat > release.txt <<'EOF'
        ## 固件文件说明

        | 文件 | 用途 | 是否刷入系统 |
        | --- | --- | --- |
        | `*-squashfs-nand-factory.ubi` | NAND 机型正式 factory 固件，适合通过支持 UBI 的恢复模式、U-Boot 或 factory 刷机方式写入 | 是 |
        | `*-squashfs-nand-factory.bin` | 与 `.ubi` 内容完全相同的副本，只是改成 `.bin` 后缀，方便某些网页上传框识别 | 是，但本质仍是 UBI 固件 |
        | `*-initramfs-fit-uImage.itb` | 临时内存启动镜像，常用于 U-Boot/TFTP 测试、救援、临时进系统 | 否，不建议当作最终系统刷入 |
        | `*.manifest` | 本次固件内置软件包清单 | 否 |
        | `sha256sums` | 固件校验值 | 否 |
        | `*.buildinfo` | 构建配置和版本信息 | 否 |

        ## 已内置能力

        - 网络：IPv6、Wi-Fi NSS、NAT NSS / TurboACC、FullCone NAT、TProxy、ipset、dnsmasq-full。
        - 海外分流：PassWall、Xray Core、Shadowsocks-libev、ShadowsocksR-libev、Trojan Plus、HAProxy、Simple Obfs、v2ray-geoip。
        - DNS：SmartDNS、ChinaDNS-NG、dnsmasq-full。
        - VPN / 组网：WireGuard 内核模块和 LuCI 管理、Tailscale、ZeroTier。
        - 常用工具：ttyd、文件传输、NATMap、UPnP、WOL、自动重启、Watchcat、vlmcsd、xlnetacc。

        ## 注意

        - `.bin` 只是 `.ubi` 的改名副本，不是另外一种 sysupgrade 格式。
        - `.itb` 是临时启动镜像，不要当作最终系统刷入。
        - OpenClash、Docker、AdGuardHome、mosdns、ddns-go、frpc、旧版 v2ray-core / v2ray-plugin / v2ray-geosite 未内置。
        EOF
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: env.UPLOAD_RELEASE == 'true' && steps.tag.outputs.status == 'success'
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
